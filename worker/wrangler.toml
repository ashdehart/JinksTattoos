name = "jinks-review-worker"
main = "review-worker.js"
compatibility_date = "2025-06-01"

# KV namespace for rate limiting.
# After running:  wrangler kv:namespace create RATE_LIMIT_KV
# copy the returned `id` value here and remove the placeholder.
kv_namespaces = [
  { binding = "RATE_LIMIT_KV", id = "9a8d37402c1646f59f70bb859f4a13e7" }
]

# Workers AI binding — account-level service, no id needed.
# Provides env.AI.run() for the pre-moderation pass.
# Free tier: 10,000 inferences/day.
[ai]
binding = "AI"

# Secrets are set via:
#   wrangler secret put GITHUB_TOKEN
#   wrangler secret put GITHUB_OWNER
#   wrangler secret put GITHUB_REPO
# Do NOT hardcode them here.
