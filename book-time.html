<!DOCTYPE html>
<!-- ═══════════════════════════════════════════════════════════════════
     JINKS TATTOOS — book-time.html (DATE & TIME PICKER PAGE)
     ─────────────────────────────────────────────────────────────────
     This page comes AFTER the Tally intake form. Once a client submits
     their tattoo details on schedule.html (which emails Jolie), Tally
     redirects them here to pick an actual date & time via the embedded
     Google Calendar Appointment Scheduling widget.

     Structure mirrors schedule.html:
       1. NAV              — same top bar
       2. BOOK-TIME CONTENT — heading + Google Calendar iframe
       3. FOOTER           — same navy footer
       4. <script>         — cursor, nav, mobile menu, ambient canvas
     ═══════════════════════════════════════════════════════════════════ -->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Book a Date & Time — Jinks Tattoos</title>
  <!-- Shared site stylesheet (nav, footer, cursor, grain, etc.) -->
  <link rel="stylesheet" href="style.css" />

  <!-- ─────────────────────────────────────────────────────────
       PAGE-SPECIFIC STYLES
       Same approach as schedule.html — these only apply to this page.
  ───────────────────────────────────────────────────────────── -->
   <style>
    /* Dark grungy background for the booking page */
    body { background: #1a1816; color: #E8D9B3; }

    /* Content wrapper — full grunge newspaper texture */
    .schedule-wrap {
      position: relative;
      overflow: hidden;
      min-height: 100vh;
      padding-top: 8rem;
      background-color: #1a1816;
      background-image:
        url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='a'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.035' numOctaves='5' stitchTiles='stitch'/%3E%3CfeColorMatrix type='saturate' values='0'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23a)'/%3E%3C/svg%3E"),
        url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='b'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23b)'/%3E%3C/svg%3E"),
        radial-gradient(ellipse 120% 80% at 20% 90%, rgba(0,0,0,.4) 0%, transparent 70%),
        radial-gradient(ellipse 100% 60% at 85% 15%, rgba(0,0,0,.35) 0%, transparent 65%),
        radial-gradient(ellipse 80% 80% at 50% 50%, transparent 30%, rgba(0,0,0,.25) 100%);
      background-blend-mode: overlay, soft-light, normal, normal, normal;
    }

    /* Diamond decoration — top right */
    .schedule-wrap::before {
      content: '♦';
      position: absolute;
      top: 18%; right: 8%;
      font-size: 7rem;
      color: #E1291D;
      opacity: .05;
      transform: rotate(-12deg);
      pointer-events: none;
      z-index: 0;
      font-family: serif;
    }

    /* Diamond decoration — bottom left */
    .schedule-wrap::after {
      content: '♦';
      position: absolute;
      bottom: 12%; left: 6%;
      font-size: 5rem;
      color: #E8D9B3;
      opacity: .04;
      transform: rotate(18deg);
      pointer-events: none;
      z-index: 0;
      font-family: serif;
    }

    /* Centered content container */
    .schedule-section {
      max-width: 960px;
      margin: 0 auto;
      padding: 3rem 2rem 7rem;
      position: relative;
      z-index: 1;
    }

    /* "Booking" eyebrow label */
    .schedule-eyebrow {
      font-size: .62rem;
      letter-spacing: .42em;
      text-transform: uppercase;
      display: block;
      margin-bottom: 1.2rem;
      color: #E1291D;
    }

    /* Big italic heading */
    .schedule-h1 {
      font-family: var(--serif);
      font-size: clamp(2.2rem, 6vw, 4.2rem);
      font-weight: 300;
      font-style: italic;
      line-height: 1.1;
      color: #E8D9B3;
      margin-bottom: 1.2rem;
      transform: rotate(-.4deg);
      display: inline-block;
    }

    /* Red accent line — extra bottom margin since there's no subtitle */
    .schedule-rule {
      width: 56px;
      height: 2px;
      background: #E1291D;
      margin-bottom: 3rem;
    }

/* Hide diamonds + tighten frame on mobile */
    @media (max-width: 860px) {
      .schedule-wrap::before,
      .schedule-wrap::after { display: none; }
      .gcal-frame { margin-left: 0; margin-right: 0; padding: .75rem; }
    }

    .gcal-frame {
      background: #EF9115;
      border: 1px solid rgba(232,217,179,.12);
      border-radius: 30px;
      padding: 1.25rem;
      box-shadow: 0 18px 50px rgba(0,0,0,.45);
      margin-left: -1rem;
      margin-right: -1rem;
      position: relative;
    }

    /* The iframe itself — sits flush inside the frame */
    .gcal-embed {
      border: 0;
      display: block;
      width: 100%;
      background: transparent;
    }
  </style>

</head>
<body>

  <!-- Custom cursor (the dot and ring that follow the mouse) -->
  <div id="cursor"></div>
  <div id="cursor-ring"></div>

  <!-- Film grain overlay -->
  <div id="grain"></div>

  <!-- ═══════════════════════════════════════════════════════════════
       NAV BAR — same as the homepage
       ═══════════════════════════════════════════════════════════════ -->
  <nav id="nav">
    <a href="index.html" class="nav-logo">Jinks</a>
    <ul class="nav-links" id="navLinks">
      <li><a href="index.html">Home</a></li>
      <li><a href="shop.html">Shop</a></li>
      <li><a href="index.html#catalog">Catalog</a></li>
      <li><a href="schedule.html" class="nav-book">Book Now</a></li>
    </ul>
    <button class="nav-toggle" id="navToggle" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
  </nav>

  <!-- ═══════════════════════════════════════════════════════════════
       BOOK-TIME CONTENT
       Heading + Google Calendar Appointment Scheduling iframe.
       No subtitle/description — just the heading then the picker.
       ═══════════════════════════════════════════════════════════════ -->
  <div class="schedule-wrap">
    <div class="schedule-section">
      <span class="schedule-eyebrow">Booking</span>
      <h1 class="schedule-h1">Book a Date &amp; Time</h1>
      <div class="schedule-rule"></div>

      <!-- ── GOOGLE CALENDAR APPOINTMENT SCHEDULING ─────────── -->
      <!-- Google Calendar Appointment Scheduling begin -->
     <!-- ── GOOGLE CALENDAR APPOINTMENT SCHEDULING ─────────── -->
      <div class="gcal-frame">
        <!-- Google Calendar Appointment Scheduling begin -->
        <iframe
          class="gcal-embed"
          src="https://calendar.google.com/calendar/appointments/schedules/AcZssZ14U714WmLxtUd81PXifZSxCmzc37h0yW4HUe89JFtGtdH7NpSTbx5qGwOi67g9OijpV_bvZELi?gv=true"
          width="100%"
          height="800"
          frameborder="0"
          title="Book a date and time with Jinks Tattoos"></iframe>
        <!-- end Google Calendar Appointment Scheduling -->
      </div>
      <!-- end Google Calendar Appointment Scheduling -->
    </div>
  </div>

  <!-- ═══════════════════════════════════════════════════════════════
       FOOTER — same as the homepage
       ═══════════════════════════════════════════════════════════════ -->
  <footer>
    <div class="footer-logo">Jinks Tattoos</div>
    <ul class="footer-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="shop.html">Shop</a></li>
      <li><a href="index.html#catalog">Catalog</a></li>
      <li><a href="schedule.html">Book</a></li>
      <li><a href="https://www.instagram.com/j.lnks" target="_blank" rel="noopener">@j.lnks</a></li>
    </ul>
    <p class="footer-copy">© 2025 Jolie Lowder · Jinks Tattoos · Garden of Ink, Ogden UT</p>
  </footer>

  <!-- ═══════════════════════════════════════════════════════════════
       JAVASCRIPT
       Same subset as schedule.html: cursor, nav scroll, mobile menu,
       and the ambient canvas that draws faded shapes behind content.
       ═══════════════════════════════════════════════════════════════ -->
  <script>
    /* Brand colors as a JS object — used by the ambient canvas below */
    const P = { red:'#E1291D', navy:'#07376A', orange:'#EF9115', cream:'#E8D9B3', black:'#0e0d0d' };


    /* ─────────────────────────────────
       CUSTOM CURSOR
    ───────────────────────────────── */
    const cur  = document.getElementById('cursor');
    const ring = document.getElementById('cursor-ring');
    document.addEventListener('mousemove', e => {
      cur.style.left = e.clientX+'px';  cur.style.top = e.clientY+'px';
      ring.style.left = e.clientX+'px'; ring.style.top = e.clientY+'px';
    });
    document.querySelectorAll('a,button').forEach(el => {
      el.addEventListener('mouseenter', () => {
        cur.style.width = '20px'; cur.style.height = '20px';
        cur.style.background = P.red; cur.style.borderRadius = '3px';
        ring.style.width = '54px'; ring.style.height = '54px';
        ring.style.borderColor = 'rgba(225,41,29,.5)';
      });
      el.addEventListener('mouseleave', () => {
        cur.style.width = '10px'; cur.style.height = '10px';
        cur.style.background = P.orange; cur.style.borderRadius = '50%';
        ring.style.width = '36px'; ring.style.height = '36px';
        ring.style.borderColor = 'rgba(239,145,21,.45)';
      });
    });


    /* ─────────────────────────────────
       NAV SCROLL EFFECT
    ───────────────────────────────── */
    const nav = document.getElementById('nav');
    window.addEventListener('scroll', () => nav.classList.toggle('scrolled', window.scrollY > 60));


    /* ─────────────────────────────────
       MOBILE NAV (HAMBURGER MENU)
    ───────────────────────────────── */
    const toggle   = document.getElementById('navToggle');
    const navLinks = document.getElementById('navLinks');
    toggle.addEventListener('click', () => {
      const open = navLinks.classList.toggle('open');
      const sp = toggle.querySelectorAll('span');
      sp[0].style.transform = open ? 'rotate(45deg) translate(4px,4px)'   : '';
      sp[1].style.opacity   = open ? '0' : '1';
      sp[2].style.transform = open ? 'rotate(-45deg) translate(4px,-4px)' : '';
    });


    /* ─────────────────────────────────
       AMBIENT BACKGROUND CANVAS
    ───────────────────────────────── */
    (function() {
      const wrap = document.querySelector('.schedule-wrap');

      const c = document.createElement('canvas');
      c.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:0;';
      wrap.insertBefore(c, wrap.firstChild);

      const pal = [
        { col:P.navy,   fill:.06, sk:.1  },
        { col:P.red,    fill:.05, sk:.09 },
        { col:P.black,  fill:.04, sk:.08 },
        { col:P.orange, fill:.05, sk:.09 },
      ];

      function draw() {
        c.width  = wrap.offsetWidth;
        c.height = wrap.offsetHeight;
        const W = c.width, H = c.height;
        const cx = c.getContext('2d');

        let s = 54321;
        const rnd = () => { s=(s*16807)%2147483647; return (s-1)/2147483646; };

        for (let i = 0; i < 9; i++) {
          const p    = pal[i % pal.length];
          const r    = 120 + rnd() * 340;
          const x    = rnd() * W;
          const y    = rnd() * H;
          const type = i % 4;
          const rot  = rnd() * Math.PI * 2;

          cx.save();
          cx.translate(x, y);
          cx.rotate(rot);
          cx.strokeStyle = p.col;
          cx.fillStyle   = p.col;
          cx.lineWidth   = 1;

          if (type === 0) {
            const pts = Array.from({length:6}, (_,j) => {
              const a = (j/6)*Math.PI*2;
              const jit = 0.5 + rnd()*0.95;
              return { x:Math.cos(a)*r*jit, y:Math.sin(a)*r*jit };
            });
            const n = pts.length;
            cx.beginPath();
            cx.moveTo((pts[0].x+pts[n-1].x)/2,(pts[0].y+pts[n-1].y)/2);
            for (let j=0;j<n;j++) {
              const curr=pts[j], next=pts[(j+1)%n];
              cx.quadraticCurveTo(curr.x,curr.y,(curr.x+next.x)/2,(curr.y+next.y)/2);
            }
            cx.closePath();
            cx.globalAlpha = p.fill; cx.fill();
            cx.globalAlpha = p.sk;   cx.stroke();

          } else if (type === 1) {
            cx.globalAlpha = p.fill * 0.7;
            cx.beginPath(); cx.arc(0,0,r,0,Math.PI*2); cx.fill();
            cx.globalAlpha = p.sk;
            cx.beginPath(); cx.arc(0,0,r,0,Math.PI*2); cx.stroke();

          } else if (type === 2) {
            cx.beginPath();
            cx.moveTo(0,-r); cx.lineTo(r*.6,0); cx.lineTo(0,r); cx.lineTo(-r*.6,0);
            cx.closePath();
            cx.globalAlpha = p.fill; cx.fill();
            cx.globalAlpha = p.sk;   cx.stroke();

          } else {
            const rw=180+rnd()*360, rh=100+rnd()*240;
            cx.globalAlpha = p.fill * 0.7;
            cx.fillRect(-rw/2,-rh/2,rw,rh);
            cx.globalAlpha = p.sk * 0.7;
            cx.strokeRect(-rw/2,-rh/2,rw,rh);
          }
          cx.restore();
        }
      }

      draw();
      window.addEventListener('resize', draw);
    })();
  </script>
</body>
</html>
